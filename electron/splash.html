<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Muxlyve</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    background: #0d1117;
    display: flex; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    color: #e6edf3;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
    transition: opacity .28s ease;
  }
  .container {
    display: flex; flex-direction: column;
    align-items: center;
  }
  .icon {
    width: 68px; height: 68px;
    margin-bottom: 16px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .7; transform: scale(.94); }
  }
  .wordmark {
    font-size: 1.25rem; font-weight: 700; letter-spacing: -.03em;
    margin-bottom: 26px;
  }
  .accent { color: #7c5cff; }
  .track {
    width: 148px; height: 2px;
    background: #2a3140; border-radius: 1px;
    overflow: hidden; margin-bottom: 12px;
  }
  .bar {
    height: 100%; width: 0;
    background: linear-gradient(90deg, #7c5cff, #4da3ff);
    border-radius: 1px;
    animation: load 2.6s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes load {
    0%   { width: 0%; }
    30%  { width: 45%; }
    65%  { width: 72%; }
    100% { width: 92%; }
  }
  .status {
    font-size: .7rem; color: #8b949e; letter-spacing: .04em;
  }
</style>
</head>
<body>
<div class="container">
  <img src="../src/public/icon-muxlyve.svg" class="icon" alt="">
  <div class="wordmark">Muxly<span class="accent">ve</span></div>
  <div class="track"><div class="bar"></div></div>
  <div class="status">Iniciando…</div>
</div>
</body>
</html>
