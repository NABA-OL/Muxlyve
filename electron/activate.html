<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Muxlyve — Activar licencia</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #2a3140;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #7c5cff;
      --danger: #f85149;
      --ok: #2ea043;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .65rem;
      margin-bottom: 1.75rem;
      -webkit-app-region: no-drag;
    }

    .logo img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
    }

    .logo-name {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #7c5cff, #4da3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.75rem 1.5rem;
      width: 100%;
      max-width: 380px;
      -webkit-app-region: no-drag;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: .2rem;
    }

    .sub {
      font-size: .83rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
    }

    label {
      font-size: .73rem;
      color: var(--muted);
      display: block;
      margin-bottom: .3rem;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: .6rem .75rem;
      font-size: .9rem;
      font-family: ui-monospace, monospace;
      letter-spacing: .06em;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
      letter-spacing: 0;
    }

    button {
      width: 100%;
      margin-top: .85rem;
      padding: .65rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s var(--ease-out), transform .1s var(--ease-out);
    }

    button:hover:not(:disabled) {
      opacity: .88;
    }

    button:active:not(:disabled) {
      transform: scale(.97);
    }

    button:disabled {
      opacity: .45;
      cursor: default;
    }

    #status {
      margin-top: .85rem;
      font-size: .8rem;
      min-height: 1.1em;
      color: var(--danger);
    }

    #status.ok {
      color: var(--ok);
    }

    .footer {
      margin-top: 1.2rem;
      font-size: .77rem;
      color: var(--muted);
      text-align: center;
      -webkit-app-region: no-drag;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .sep {
      margin: .3rem 0;
    }

    body {
      position: relative;
    }

    .lang-switch {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 4px;
      -webkit-app-region: no-drag;
    }

    .lang-btn {
      width: auto;
      margin: 0;
      padding: .28rem .55rem;
      font-size: .68rem;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
  </style>
</head>

<body>
  <div class="lang-switch">
    <button type="button" class="lang-btn" data-lang="es" onclick="switchLang('es')">ES</button>
    <button type="button" class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
  </div>
  <div class="logo">
    <img src="../build/icon-muxlyve.png" alt="Muxlyve">
    <span class="logo-name">Muxlyve</span>
  </div>

  <div class="card">
    <h1>Activar licencia</h1>
    <p class="sub">Pega tu clave para desbloquear la app en este equipo.</p>
    <label for="keyInput">Clave de licencia</label>
    <input id="keyInput" type="text" placeholder="sk-XxxX-xxXX-XXxx" autocomplete="off" spellcheck="false"
      autocorrect="off">
    <button id="activateBtn" onclick="activate()">Activar</button>
    <div id="status"></div>
  </div>

  <div class="footer">
    <div class="sep">¿No tienes licencia? <a href="#" onclick="openBuy(event)">Comprar Muxlyve</a></div>
    <div>Solo necesitas internet para activar — transmites offline.</div>
  </div>

  <script>
    const STORE_URL = 'https://muxlyve.app/#buy';
    const urlParams = new URLSearchParams(window.location.search);
    const lang = urlParams.get('lang') || 'en';

    const t = {
      es: {
        title: 'Muxlyve — Activar licencia',
        h1: 'Activar licencia',
        sub: 'Pega tu clave para desbloquear la app en este equipo.',
        label: 'Clave de licencia',
        activateBtn: 'Activar',
        noLic: '¿No tienes licencia? ',
        buy: 'Comprar Muxlyve',
        footer: 'Solo necesitas internet para activar — transmites offline.',
        subCancelTitle: 'Suscripción cancelada',
        subCancelDesc: 'Tu suscripción fue cancelada. Para seguir usando Muxlyve, renuévala o adquiere un nuevo plan.',
        subCancelBtn: 'Renovar suscripción',
        subCancelNote: '¿Ya renovaste? Libera este equipo desde otro dispositivo o espera a que la validación se actualice.',
        errPaste: 'Pega tu clave primero.',
        btnVerifying: 'Verificando…',
        okEmail: email => `Activado como ${email}. Abriendo la app…`,
        okMsg: '¡Activado! Abriendo la app…',
        btnOk: '✓ Activado',
        errInvalid: 'Clave inválida.',
        errUnexpected: 'Error inesperado. Intenta de nuevo.'
      },
      en: {
        title: 'Muxlyve — Activate license',
        h1: 'Activate license',
        sub: 'Paste your key to unlock the app on this device.',
        label: 'License key',
        activateBtn: 'Activate',
        noLic: "Don't have a license? ",
        buy: 'Buy Muxlyve',
        footer: 'Internet is only needed for activation — you stream offline.',
        subCancelTitle: 'Subscription cancelled',
        subCancelDesc: 'Your subscription was cancelled. To continue using Muxlyve, renew it or purchase a new plan.',
        subCancelBtn: 'Renew subscription',
        subCancelNote: 'Already renewed? Release this device from another one or wait for validation to update.',
        errPaste: 'Paste your key first.',
        btnVerifying: 'Verifying…',
        okEmail: email => `Activated as ${email}. Opening app…`,
        okMsg: 'Activated! Opening app…',
        btnOk: '✓ Activated',
        errInvalid: 'Invalid key.',
        errUnexpected: 'Unexpected error. Try again.'
      }
    };
    let currentLang = (lang === 'es' ? 'es' : 'en');
    let i18n = t[currentLang];

    function updateLangButtons() {
      document.querySelectorAll('.lang-btn').forEach((b) => {
        b.classList.toggle('active', b.dataset.lang === currentLang);
      });
    }

    function switchLang(newLang) {
      if (newLang === currentLang) return;
      currentLang = newLang;
      i18n = t[currentLang];
      applyTranslations();
      updateLangButtons();
      // Persiste la elección para que la app principal abra en el mismo idioma después de
      // activar — msApp viene del mismo preload.cjs que usa la ventana principal.
      window.msApp?.setLanguage?.(currentLang).catch(() => {});
    }

    function applyTranslations() {
      document.title = i18n.title;
      document.querySelector('h1').textContent = i18n.h1;
      document.querySelector('.sub').textContent = i18n.sub;
      document.querySelector('label[for="keyInput"]').textContent = i18n.label;
      document.getElementById('activateBtn').textContent = i18n.activateBtn;
      
      const footerSep = document.querySelector('.footer .sep');
      footerSep.childNodes[0].nodeValue = i18n.noLic;
      footerSep.querySelector('a').textContent = i18n.buy;
      document.querySelector('.footer div:nth-child(2)').textContent = i18n.footer;
    }

    function openBuy(e) {
      e.preventDefault();
      window.open(STORE_URL, '_blank');
    }

    // Al cargar: si la suscripción está cancelada, reemplaza el formulario.
    window.addEventListener('DOMContentLoaded', async () => {
      applyTranslations();
      updateLangButtons();
      try {
        const info = await window.msLicense?.getInfo();
        if (info?.status === 'cancelled') {
          document.querySelector('.card').innerHTML = `
            <h1 style="margin-bottom:.5rem">${i18n.subCancelTitle}</h1>
            <p class="sub">${i18n.subCancelDesc}</p>
            <button onclick="window.open('${STORE_URL}','_blank')">${i18n.subCancelBtn}</button>
            <p class="sub" style="margin-top:.9rem;font-size:.75rem">${i18n.subCancelNote}</p>
          `;
        }
      } catch { /* sin licencia en caché — mostrar formulario normal */ }
    });

    function setStatus(msg, isOk = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = isOk ? 'ok' : '';
    }

    async function activate() {
      const key = document.getElementById('keyInput').value.trim();
      if (!key) { setStatus(i18n.errPaste); return; }

      const btn = document.getElementById('activateBtn');
      btn.disabled = true;
      btn.textContent = i18n.btnVerifying;
      setStatus('');

      try {
        const result = await window.msLicense.activate(key);
        if (result.ok) {
          const msg = result.email
            ? i18n.okEmail(result.email)
            : i18n.okMsg;
          setStatus(msg, true);
          btn.textContent = i18n.btnOk;
        } else {
          setStatus(result.error || i18n.errInvalid);
          btn.disabled = false;
          btn.textContent = i18n.activateBtn;
        }
      } catch {
        setStatus(i18n.errUnexpected);
        btn.disabled = false;
        btn.textContent = i18n.activateBtn;
      }
    }

    document.getElementById('keyInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') activate();
    });

    document.getElementById('keyInput').addEventListener('input', (e) => {
      e.target.value = e.target.value.trim();
    });
  </script>
</body>

</html>
