<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Multi_Stream">
  <defs>
    <linearGradient id="ms-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#4da3ff"/>
    </linearGradient>
  </defs>
  <!-- Marca: una fuente que se reparte en cuatro destinos -->
  <g stroke="url(#ms-grad)" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M16 32 H30"/>
    <path d="M30 32 C40 32 40 14 52 14"/>
    <path d="M30 32 C40 32 40 24 52 24"/>
    <path d="M30 32 C40 32 40 40 52 40"/>
    <path d="M30 32 C40 32 40 50 52 50"/>
  </g>
  <!-- Nodo de origen -->
  <circle cx="14" cy="32" r="6" fill="url(#ms-grad)"/>
  <!-- Nodos de destino -->
  <circle cx="54" cy="14" r="4" fill="#4da3ff"/>
  <circle cx="54" cy="24" r="4" fill="#7c5cff"/>
  <circle cx="54" cy="40" r="4" fill="#2ea043"/>
  <circle cx="54" cy="50" r="4" fill="#f85149"/>
  <!-- Wordmark -->
  <text x="78" y="40" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#e6edf3">Multi</tspan><tspan fill="#7c5cff">_</tspan><tspan fill="#e6edf3">Stream</tspan>
  </text>
</svg>
